<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center p-6 text-on-surface">
<!-- TopAppBar Shell (Suppressed for focused Transactional logic, but including as hidden reference if needed for global context) -->
<header class="bg-white/72 dark:bg-black/72 backdrop-blur-xl fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full shadow-none">
<div class="flex items-center">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400 active:scale-95 duration-200 transition-opacity hover:opacity-80">close</span>
</div>
<h1 class="font-['SF_Pro_Display'] tracking-tighter font-bold text-2xl text-slate-900 dark:text-slate-50">NEXUS</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Auth Canvas -->
<main class="w-full max-w-[400px] flex flex-col items-center pt-8">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<h1 class="text-4xl font-bold tracking-tighter text-on-surface mb-2 font-headline">NEXUS</h1>
<p class="text-[28px] font-bold text-on-surface tracking-tight font-headline">Sign In</p>
</div>
<!-- Input Group: iOS-Style List Card -->
<div class="w-full bg-surface-container-lowest rounded-[20px] overflow-hidden mb-8 shadow-[0_12px_40px_rgba(0,0,0,0.04)]">
<!-- Email Field -->
<div class="relative px-5 pt-4 pb-3">
<label class="block text-[11px] font-semibold text-primary uppercase tracking-wider mb-1" for="email">Email</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 text-[17px]" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Structural Tonal Divider -->
<div class="h-[1px] mx-5 bg-surface-container-high"></div>
<!-- Password Field -->
<div class="relative px-5 pt-4 pb-3">
<div class="flex justify-between items-end">
<div class="flex-grow">
<label class="block text-[11px] font-semibold text-primary uppercase tracking-wider mb-1" for="password">Password</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 text-[17px]" id="password" placeholder="Required" type="password"/>
</div>
<button class="text-primary text-[15px] font-medium pb-0.5" type="button">Forgot?</button>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="w-full space-y-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white rounded-full font-semibold text-[17px] shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform duration-200">
                Sign In
            </button>
<div class="flex flex-col items-center space-y-6 pt-4">
<a class="text-primary font-medium text-[15px] hover:opacity-80 transition-opacity" href="#">Create account</a>
<div class="text-center px-8">
<p class="text-on-surface-variant text-[12px] leading-relaxed opacity-60">
                        By continuing, you agree to the Nexus Terms of Service and Privacy Policy.
                    </p>
</div>
</div>
</div>
<!-- Decorative Background Element (Editorial Asymmetry) -->
<div class="fixed -bottom-20 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-20 -left-20 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</main>
<!-- BottomNavBar Shell (Responsive Navigation Logic) -->
<!-- As per instructions, active state determined by page intent -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-3xl bg-white/72 dark:bg-black/72 backdrop-blur-xl flex justify-around items-center h-20 pb-safe px-8 w-full shadow-[0_-12px_40px_rgba(0,0,0,0.08)]">
<a class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 font-semibold active:scale-90 transition-transform duration-200 hover:text-blue-500 dark:hover:text-blue-300" href="#">
<span class="material-symbols-outlined" data-icon="login">login</span>
<span class="font-['SF_Pro_Text'] text-[11px] font-medium">Sign In</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 active:scale-90 transition-transform duration-200 hover:text-blue-500 dark:hover:text-blue-300" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-['SF_Pro_Text'] text-[11px] font-medium">Create Account</span>
</a>
</nav>

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-8">
<p class="text-white/60 text-[12px] font-bold tracking-widest uppercase mb-2">Featured Hardware</p>
<h3 class="text-white text-2xl font-bold font-headline leading-tight">Nexus Titan X<br/>Limited Edition</h3>
</div>
