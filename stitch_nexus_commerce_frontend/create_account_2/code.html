<body class="bg-surface text-on-surface selection:bg-primary/20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/72 dark:bg-black/72 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full shadow-none">

<!-- Header Section -->
<div class="mb-8 text-center sm:text-left">
<h1 class="text-[28px] font-bold leading-tight tracking-tight text-on-surface font-headline">Create Account</h1>
<p class="mt-2 text-on-surface-variant font-body leading-relaxed">Join the Nexus Gallery for exclusive access to premium hardware.</p>
</div>
<!-- Registration Form -->
<form class="space-y-8">
<!-- Group 1: Account Info -->
<div class="space-y-2">
<label class="text-[13px] font-semibold text-on-surface-variant/80 uppercase tracking-wider px-4">Account info</label>
<div class="bg-surface-container-lowest rounded-[20px] overflow-hidden ios-input-group">
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="person">person</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="Full Name" type="text"/>
</div>
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="mail">mail</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="Email" type="email"/>
</div>
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="lock">lock</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="Password" type="password"/>
</div>
</div>
</div>
<!-- Group 2: Shipping Details -->
<div class="space-y-2">
<label class="text-[13px] font-semibold text-on-surface-variant/80 uppercase tracking-wider px-4">Shipping details</label>
<div class="bg-surface-container-lowest rounded-[20px] overflow-hidden ios-input-group">
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="home">home</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="Address" type="text"/>
</div>
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="location_city">location_city</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="City" type="text"/>
</div>
<div class="flex items-center px-4 py-4 bg-white">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]" data-icon="markunread_mailbox">markunread_mailbox</span>
<input class="flex-1 bg-transparent border-none p-0 text-[17px] focus:ring-0 placeholder:text-outline-variant" placeholder="Zip Code" type="text"/>
</div>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 px-6 rounded-xl font-semibold text-[17px] shadow-lg shadow-primary/20 active:scale-95 transition-all duration-200" type="submit">
                        Create Account
                    </button>
<div class="text-center">
<a class="text-primary font-medium text-[15px] hover:underline transition-all" href="#">
                            Already have an account? Sign in
